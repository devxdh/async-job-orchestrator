services:
  postgres:
    image: postgres:16-alpine
    container_name: async-job-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jobapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: async-job-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      JWT_SECRET: dev-secret-change-me
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: jobapp
      DB_TEST_NAME: jobapp_test
      TEST_DB_WORKERS: 4
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
